# .github/workflows/build-macos.yml

name: Build macOS

on:
  workflow_dispatch:

jobs:
  verify-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Verify latest CI workflow succeeded
        uses: actions/github-script@v7
        with:
          script: |
            const workflows = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              status: 'completed',
              per_page: 1
            });

            if (workflows.data.workflow_runs.length === 0) {
              core.setFailed('No completed CI workflow runs found.');
              return;
            }

            const latest = workflows.data.workflow_runs[0];

            if (latest.conclusion !== 'success') {
              core.setFailed(`Latest CI workflow did not succeed. Conclusion: ${latest.conclusion}`);
            }

  build:
    needs: verify-ci
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Build macOS app bundle
        run: cargo bundle --release

      - name: Verify bundle exists
        run: |
          ls -la target/release/bundle/osx
          test -d target/release/bundle/osx/Tabless.app

      - name: Create DMG
        run: |
          mkdir -p dist

          hdiutil create \
            -volname "Tabless" \
            -srcfolder target/release/bundle/osx/Tabless.app \
            -ov \
            -format UDZO \
            dist/Tabless.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabless-macos
          path: dist/Tabless.dmg
