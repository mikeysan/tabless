# .github/workflows/build-macos.yml

name: Build macOS

on:
  workflow_dispatch:

jobs:
  verify-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Verify latest CI workflow succeeded
        uses: actions/github-script@v7
        with:
          script: |
            const workflows = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              status: 'completed',
              per_page: 1
            });

            if (workflows.data.workflow_runs.length === 0) {
              core.setFailed('No completed CI workflow runs found.');
              return;
            }

            const latest = workflows.data.workflow_runs[0];

            if (latest.conclusion !== 'success') {
              core.setFailed(`Latest CI workflow did not succeed. Conclusion: ${latest.conclusion}`);
            }

  build:
    needs: verify-ci
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabless-macos
          path: target/release/tabless
