# .github/workflows/build-macos.yml

name: Build macOS

on:
  workflow_dispatch:

jobs:
  verify-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Verify latest CI workflow succeeded
        uses: actions/github-script@v7
        with:
          script: |
            const workflows = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              status: 'completed',
              per_page: 1
            });

            if (workflows.data.workflow_runs.length === 0) {
              core.setFailed('No completed CI workflow runs found.');
              return;
            }

            const latest = workflows.data.workflow_runs[0];

            if (latest.conclusion !== 'success') {
              core.setFailed(`Latest CI workflow did not succeed. Conclusion: ${latest.conclusion}`);
            }

  build:
    needs: verify-ci
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Create .app bundle
        run: |
          APP=target/release/bundle/Tabless.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp target/release/tabless "$APP/Contents/MacOS/Tabless"
          cat > "$APP/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Tabless</string>
            <key>CFBundleIdentifier</key>
            <string>com.mikeysan.tabless</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleExecutable</key>
            <string>Tabless</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
          </dict>
          </plist>
          EOF

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabless-macos
          path: target/release/bundle/Tabless.app
