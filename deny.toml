    { name = "linux-raw-sys" },
    { name = "objc2" },
    { name = "objc2-app-kit" },
    { name = "objc2-foundation" },
    { name = "redox_syscall" },
    { name = "rustix" },
    { name = "smithay-client-toolkit" },
    { name = "thiserror" },
    { name = "thiserror-impl" },
    { name = "windows-sys" },
    { name = "windows-targets" },
    { name = "windows_aarch64_gnullvm" },
    { name = "windows_aarch64_msvc" },
    { name = "windows_i686_gnu" },
    { name = "windows_i686_gnullvm" },
